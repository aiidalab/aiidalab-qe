---
# Run basic tests for this app

name: CI

on: [push, pull_request]

# https://docs.github.com/en/actions/using-jobs/using-concurrency
concurrency:
    # only cancel in-progress jobs or runs for the current workflow - matches against branch & tags
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    FORCE_COLOR: 1

jobs:

    test-package:

        strategy:
            matrix:
                python-version: ['3.9', '3.11', '3.12']
                aiida-core-version: [git+https://github.com/mbercx/aiida-core@fix/6994/builder-repr]
            fail-fast: false

        runs-on: ubuntu-latest
        timeout-minutes: 30

        services:
            rabbitmq:
                image: rabbitmq:latest
                ports:
                    - 5672:5672

        steps:

            - name: Check out app
              uses: actions/checkout@v6

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Install uv
              uses: astral-sh/setup-uv@v7
              with:
                  activate-environment: true
                  python-version: ${{ matrix.python-version }}

            - name: Install package
              run: uv pip install -e .[dev] aiida-core@${{ matrix.aiida-core-version }}

            - name: Run pytest
              run: pytest -v tests --cov=aiidalab_qe --skip-slow

            - name: Upload coverage reports to Codecov
              uses: codecov/codecov-action@v5
              with:
                  flags: python-${{ matrix.python-version }}
                  token: ${{ secrets.CODECOV_TOKEN }}
